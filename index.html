
  <!DOCTYPE html>
  <html lang="de">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="description" content="Ich entwerfe und entwickle moderne, professionelle Webseiten für lokale Unternehmen. Komplett fertig eingerichtet inkl. Hosting & SEO." />
      <meta name="author" content="Jonas Gissler" />
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <title>Gissler Webdesign | Moderne Webseiten für lokale Unternehmen</title>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    </head>

    <body>
      <script>
        // Decode the redirect from 404.html so React Router sees the correct path
        (function(l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function(s) {
              return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
          }
        }(window.location));
      </script>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
