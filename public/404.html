<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GA Webdesign</title>
  <script>
    // SPA redirect: encode the path into the query string so index.html can decode it.
    // segmentCount = 0 means custom domain at root (no subdirectory)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
